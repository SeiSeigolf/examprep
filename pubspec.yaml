name: exam_os
description: "ExamOS - 医学部期末テスト最適化システム"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # 状態管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # DB (SQLite)
  drift: ^2.26.0
  sqlite3_flutter_libs: ^0.5.30
  path_provider: ^2.1.5
  path: ^1.9.1

  # ファイル選択
  file_picker: ^9.2.1

  # アイコン
  cupertino_icons: ^1.0.8
  syncfusion_flutter_pdf: ^32.2.7
  syncfusion_flutter_pdfviewer: ^32.2.7
  file_selector: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.26.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.1
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.1

flutter:
  uses-material-design: true
